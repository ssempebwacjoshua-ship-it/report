[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
board_build.partitions = partitions_ota.csv
lib_deps =
  bblanchon/ArduinoJson @ ^7.4.2
build_flags =
  -DSSAMENJ_GATEWAY_VERSION=\"1.0.1\"
  -DSSAMENJ_GATEWAY_NAME=\"SSAMENJ_READER_GATEWAY\"

[env:native]
platform = native
test_framework = unity
test_build_src = no
build_flags =
  -DSSAMENJ_GATEWAY_VERSION=\"1.0.1\"
